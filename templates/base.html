<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Gestor{% endblock %} | Proyectos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background: #f8f9fa; }
    .navbar { background: linear-gradient(135deg, #1e3a5f, #2d6a4f) !important; }
    .navbar-brand { font-weight: 700; letter-spacing: 1px; color: #fff !important; }
    .nav-link { color: rgba(255,255,255,0.85) !important; }
    .nav-link:hover { color: #fff !important; }
    .card { border: none; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); transition: transform .2s, box-shadow .2s; overflow: hidden; }
    .card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,0,0,0.13); }
    
    /* IMAGEN ARREGLADA - MÁS GRANDE Y MEJOR */
    .card-img-top { 
      height: 300px !important; 
      object-fit: cover !important; 
      width: 100% !important;
    }
    
    /* Responsive perfecto para imágenes */
    @media (max-width: 992px) {
      .card-img-top { height: 250px !important; }
    }
    @media (max-width: 768px) {
      .card-img-top { height: 200px !important; }
    }
    @media (max-width: 576px) {
      .card-img-top { height: 160px !important; }
    }
    
    /* PLACEHOLDER IGUAL DE GRANDE */
    .img-placeholder { 
      height: 300px !important;
      background: linear-gradient(135deg, #e9ecef, #dee2e6); 
      display: flex; 
      align-items: center; 
      justify-content: center; 
    }
    
    @media (max-width: 992px) {
      .img-placeholder { height: 250px !important; }
    }
    @media (max-width: 768px) {
      .img-placeholder { height: 200px !important; }
    }
    @media (max-width: 576px) {
      .img-placeholder { height: 160px !important; }
    }
    
    .badge { font-size: .75rem; padding: .45em .85em; border-radius: 50px; }
    .btn-primary { background: #2d6a4f; border-color: #2d6a4f; border-radius: 50px; padding: .45rem 1.2rem; }
    .btn-primary:hover { background: #1e3a5f; border-color: #1e3a5f; }
    .btn-outline-primary { border-radius: 50px; border-color: #2d6a4f; color: #2d6a4f; }
    .btn-outline-primary:hover { background: #2d6a4f; border-color: #2d6a4f; }
    .btn-outline-secondary { border-radius: 50px; }
    .btn-outline-danger { border-radius: 50px; }
    .page-header { background: linear-gradient(135deg, #1e3a5f, #2d6a4f); color: white; border-radius: 16px; padding: 2rem; margin-bottom: 2rem; }
    .form-control, .form-select { border-radius: 10px; border: 1.5px solid #dee2e6; }
    .form-control:focus, .form-select:focus { border-color: #2d6a4f; box-shadow: 0 0 0 .2rem rgba(45,106,79,.15); }
    .admin-link { font-size: .8rem; opacity: .7; }
    .admin-link:hover { opacity: 1; }
  </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark mb-4">
  <div class="container">
    <a class="navbar-brand" href="/"><i class="bi bi-kanban me-2"></i>Gestor de Proyectos</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="nav">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="{% url 'proyecto_lista' %}"><i class="bi bi-folder2 me-1"></i>Proyectos</a></li>
        <li class="nav-item"><a class="nav-link" href="{% url 'tarea_lista' %}"><i class="bi bi-check2-square me-1"></i>Tareas</a></li>
      </ul>
      <a href="/admin/" class="admin-link text-white text-decoration-none"><i class="bi bi-shield-lock me-1"></i>Admin</a>
    </div>
  </div>
</nav>
<div class="container pb-5">
  {% if messages %}
    {% for m in messages %}
    <div class="alert alert-{{ m.tags|default:'info' }} alert-dismissible fade show rounded-3" role="alert">
      <i class="bi bi-check-circle me-2"></i>{{ m }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    {% endfor %}
  {% endif %}
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
