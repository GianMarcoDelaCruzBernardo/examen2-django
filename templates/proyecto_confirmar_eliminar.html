{% extends 'base.html' %}
{% block title %}Eliminar {{ tipo }}{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card border-danger p-2">
      <div class="card-body text-center">
        <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size:3rem"></i>
        <h4 class="fw-bold mt-3">¿Eliminar {{ tipo }}?</h4>
        <p class="text-muted">Estás a punto de eliminar <strong>{{ objeto }}</strong>. Esta acción no se puede deshacer.</p>
        <form method="post" class="d-flex gap-2 justify-content-center mt-4">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger px-4"><i class="bi bi-trash me-1"></i>Sí, eliminar</button>
          <a href="javascript:history.back()" class="btn btn-outline-secondary">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
